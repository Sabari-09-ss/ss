<body>

  <main>
    <section class="page-hero page-hero-gallery">
      <div class="container reveal">
        <h1>Event Gallery</h1>
        <p>A glimpse into celebrations we have designed with heart and elegance.</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <h2 class="section-title reveal">Browse by Category</h2>

        <div class="gallery-filters reveal">
          <button class="filter-btn active" type="button" data-filter="all">All</button>
          <button class="filter-btn" type="button" data-filter="weddings">Weddings</button>
          <button class="filter-btn" type="button" data-filter="decorations">BIRTHDAY-FUNCTIONS</button>
          <button class="filter-btn" type="button" data-filter="corporate">MEHANDI</button>
        </div>

        <div class="gallery-grid">
          <img class="reveal gallery-item" data-category="weddings" src="Weddings/ss.jpg" alt="Wedding mandap decoration by Sabari Events" loading="lazy" />
          <img class="reveal gallery-item" data-category="weddings" src="images/weddings/wed2.jpg" alt="Bride and groom wedding stage by Sabari Events" loading="lazy" />
          <img class="reveal gallery-item" data-category="weddings" src="images/weddings/wed3.jpg" alt="Luxury wedding reception setup by Sabari Events" loading="lazy" />

          <img class="reveal gallery-item" data-category="decorations" src="images/decorations/decor1.jpg" alt="Floral wedding decoration detail by Sabari Events" loading="lazy" />
          <img class="reveal gallery-item" data-category="decorations" src="images/decorations/decor2.jpg" alt="Traditional festive theme setup by Sabari Events" loading="lazy" />
          <img class="reveal gallery-item" data-category="decorations" src="images/decorations/decor3.jpg" alt="Elegant table and stage decor by Sabari Events" loading="lazy" />

          <img class="reveal gallery-item" data-category="corporate" src="images/corporate/corp1.jpg" alt="Corporate conference event by Sabari Events" loading="lazy" />
          <img class="reveal gallery-item" data-category="corporate" src="images/corporate/corp2.jpg" alt="Corporate networking event setup by Sabari Events" loading="lazy" />
          <img class="reveal gallery-item" data-category="corporate" src="images/corporate/corp3.jpg" alt="Corporate annual event lighting by Sabari Events" loading="lazy" />
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
